<!DOCTYPE html>
<html>
<head>
    <title>Hospital Patient Registry</title>
     <link rel="stylesheet" href="hospital_registry_style.css">
</head>
<body>
    <div class="container">
    <h2>🏥 Hospital Patient Registry</h2>

    <form action="/register" method="POST">

        <label>Patient Name:</label>
        <input type="text" name="name" required>

        <br><br>

        <label>Date of Admission:</label>
        <input type="date" name="date" required>

        <br><br>

        <label>Illness Name:</label>
        <input type="text" name="illness" required>

        <br><br>

        <button type="submit">Register Patient</button>

    </form>

    <br>

    <a href="/patients">Show Registered Patients</a>
    </div>
</body>
</html>
