<!DOCTYPE html>
<html>
<head>
    <title>Hospital Patient Registry</title>
     <link rel="stylesheet" href="hospital_registry_style.css">
</head>
<body>
    <div class="container">
    <h2>🏥 MediTrack System </h2>

    <form action="/register" method="POST">

        <label>Patient Name:</label>
        <input type="text" name="name" required>

        <br><br>
        <label>Age:</label>
        <input type="number" name="age" min="1" max="120" required>

        <br><br>

        <label>Gender:</label>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>

        <br><br>

        <label>Date of Birth:</label>
        <input type="date" name="dob" required>

        <br><br>

        <label>Mobile Number:</label>
        <input type="tel" name="mobile" pattern="[0-9]{10}" required>

        <br><br>

        <label>Email:</label>
        <input type="email" name="email" required>

        <br><br>

        <label>Address:</label>
        <textarea name="address" rows="3" required></textarea>

        <br><br>


        <label>Date of Admission:</label>
        <input type="date" name="date" required>

        <br><br>

        <label>Illness/Disease Name:</label>
        <input type="text" name="illness" required>

        <br><br>

        <button type="submit">Register Patient</button>

    </form>

    <br>

    <a href="/patients">Show Registered Patients</a>
    </div>
</body>
</html>
